<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Quandle</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{background:#09090b;color:#f4f4f5;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
ul{list-style:none}
input{font-family:inherit;color:#f4f4f5;border:none;background:none;width:100%;font-size:16px}
input:focus{outline:none}
input::placeholder{color:#52525b}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:99px}
@keyframes tileIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:none}}
.tile-in{animation:tileIn .28s ease-out both}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite;line-height:0}
.page{display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px}
.inner{width:100%;max-width:600px}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px}
.badge{font-size:10px;letter-spacing:.4em;color:#fbbf24;font-weight:600;flex-shrink:0}
.hdr-btns{display:flex;gap:8px}
.btn-new{display:inline-flex;align-items:center;gap:5px;background:#f59e0b;color:#09090b;border-radius:99px;padding:8px 14px;font-size:13px;font-weight:700;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-new:hover{background:#fbbf24}
.btn-new:active{transform:scale(.96)}
.btn-give-up{display:inline-flex;align-items:center;gap:5px;background:transparent;color:#71717a;border:1.5px solid #3f3f46;border-radius:99px;padding:8px 14px;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-give-up:hover{border-color:#f87171;color:#f87171}
.btn-give-up:active{transform:scale(.96)}

/* title */
.t-wrap{text-align:center;margin-bottom:6px}
.t-main{font-weight:900;font-size:36px;letter-spacing:.18em;line-height:1}
.t-dot{color:#f59e0b}
.t-sub{display:block;font-size:12px;letter-spacing:.5em;color:#52525b;font-weight:700;margin-top:4px}
.subtitle{text-align:center;font-size:13px;color:#a1a1aa;margin-bottom:16px}
.subtitle strong{color:#f4f4f5;font-weight:600}

/* search */
.search-wrap{position:relative;margin-bottom:12px}
.search-box{display:flex;align-items:center;gap:8px;background:#18181b;border:1.5px solid #3f3f46;border-radius:14px;padding:10px 14px;transition:border-color .15s}
.search-box:focus-within{border-color:#f59e0b}
.s-icon{color:#71717a;flex-shrink:0;display:flex;align-items:center}
.clear-btn{color:#71717a;line-height:0;padding:4px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.clear-btn:hover{color:#a1a1aa}
.dropdown{position:absolute;z-index:30;top:calc(100% + 6px);left:0;right:0;background:#18181b;border:1.5px solid #3f3f46;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.7)}
.dropdown li button{width:100%;text-align:left;padding:13px 16px;font-size:15px;color:#f4f4f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-tap-highlight-color:transparent;display:block}
.dropdown li button:hover,.dropdown li button:active{background:#27272a}
.searching{padding:12px 16px;font-size:13px;color:#71717a;display:flex;align-items:center;gap:8px}
.err-msg{font-size:12px;color:#f87171;margin-top:6px;padding:0 2px}

/* status card */
.status-card{border-radius:14px;border:1.5px solid #3f3f46;background:#18181b;padding:20px;display:flex;align-items:center;justify-content:center;gap:8px;color:#a1a1aa;margin-bottom:14px;font-size:14px}
.status-card.error{border-color:#f87171;background:#1c0a0a;flex-direction:column;text-align:center;gap:8px}
.status-card.error .err-title{font-weight:600;color:#f87171;font-size:14px}
.status-card.error p{font-size:13px;color:#a1a1aa}
.btn-retry{background:#f59e0b;color:#09090b;border-radius:99px;padding:7px 18px;font-size:13px;font-weight:700}

/* deductions */
.deductions{border-radius:14px;border:1.5px solid #27272a;background:#111113;padding:12px;margin-bottom:12px}
.ded-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#52525b;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ded-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
@media(min-width:480px){.ded-grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.ded-cell{background:#18181b;border:1.5px solid #27272a;border-radius:10px;padding:7px 10px}
.ded-cell-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:#52525b;font-weight:700;margin-bottom:3px}
.ded-cell-val{font-size:12px;font-weight:600;color:#a1a1aa;line-height:1.3}
.ded-cell-val.exact{color:#34d399}
.ded-known{display:flex;flex-direction:column;gap:5px;border-top:1px solid #27272a;padding-top:8px;margin-top:2px}
.ded-known-row{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.ded-known-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#52525b;margin-right:2px;flex-shrink:0}

/* hints */
.hints-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#71717a}
.hints-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
@media(max-width:480px){.hints-grid{grid-template-columns:1fr}}
.hint-locked{border-radius:10px;border:1.5px solid #1f1f22;background:#111113;padding:10px 12px;display:flex;align-items:center;gap:6px;color:#3f3f46;font-size:12px}
.hint-reveal{border-radius:10px;border:1.5px solid #f59e0b;background:#f59e0b;color:#09090b;padding:10px 12px;font-size:13px;font-weight:700;text-align:left;width:100%;display:block;-webkit-tap-highlight-color:transparent}
.hint-reveal:hover{background:#fbbf24}
.hint-reveal:active{transform:scale(.97);background:#fbbf24}
.hint-open{border-radius:10px;border:1.5px solid #3f3f46;background:#27272a;padding:10px 12px}
.hint-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.12em;opacity:.6;font-weight:700;margin-bottom:3px}
.hint-val{font-size:13px;font-weight:600;color:#f4f4f5;line-height:1.4}

/* banner */
.banner{border-radius:14px;border:1.5px solid;padding:16px;text-align:center;margin-bottom:14px}
.banner.win{border-color:#059669;background:#052e16}
.banner.lose{border-color:#f87171;background:#1c0a0a}
.banner.gaveup{border-color:#6366f1;background:#13111f}
.banner-ttl{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:17px;margin-bottom:4px;flex-wrap:wrap}
.trophy{color:#f59e0b;display:inline-flex}
.banner p{font-size:13px;color:#d4d4d8;margin-top:2px}
.banner p strong{color:#f4f4f5}
.btn-again{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:#f59e0b;color:#09090b;border-radius:99px;padding:9px 22px;font-size:14px;font-weight:700;-webkit-tap-highlight-color:transparent}
.btn-again:hover{background:#fbbf24}
.btn-again:active{transform:scale(.96)}

/* empty */
.empty{border-radius:14px;border:1.5px dashed #27272a;padding:40px 20px;text-align:center;color:#52525b;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:14px}

/* guess rows */
.guesses{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.guess-row{border-radius:14px;border:1.5px solid #27272a;background:#18181b;padding:12px}
.guess-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;gap:4px}
.guess-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guess-num{font-size:11px;color:#71717a;flex-shrink:0}
.tile-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:6px}
.tile{border-radius:10px;border:1.5px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 4px;min-height:70px}
.tile.green{background:#059669;border-color:#34d399;color:#fff}
.tile.gold{background:#f59e0b;border-color:#fcd34d;color:#09090b}
.tile.gray{background:#27272a;border-color:#3f3f46;color:#a1a1aa}
.t-lbl{font-size:7.5px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;opacity:.7;margin-bottom:2px}
.t-val{font-size:12px;font-weight:700;line-height:1.2;word-break:break-word}
.t-val.sm{font-size:10px}
.chip-row{border-radius:10px;border:1.5px solid #3f3f46;background:#27272a;padding:8px 10px;margin-top:6px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px}
.chip.green{background:#059669;color:#fff}
.chip.gold{background:#f59e0b;color:#09090b}
.chip.gray{background:#3f3f46;color:#a1a1aa}

/* legend */
.legend-section{background:#111113;border:1.5px solid #1f1f22;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.legend-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#52525b;margin-bottom:10px}
.legend-row{display:flex;flex-wrap:wrap;gap:10px 20px;margin-bottom:8px}
.legend-row:last-child{margin-bottom:0}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#71717a}
.swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0;display:inline-block}
.swatch.green{background:#059669}
.swatch.gold{background:#f59e0b}
.swatch.gray{background:#3f3f46}
.thresholds{margin-top:10px;padding-top:10px;border-top:1px solid #27272a}
.thresh-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#52525b;margin-bottom:6px}
.thresh-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
@media(min-width:480px){.thresh-grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.thresh-item{font-size:11px;color:#71717a}
.thresh-item strong{color:#a1a1aa;font-weight:600}

.stats-line{text-align:center;font-size:12px;color:#52525b;margin-bottom:6px}
.footer{text-align:center;font-size:11px;color:#3f3f46;max-width:400px;margin:0 auto;line-height:1.6}
</style>
</head>
<body>
<div class="page"><div class="inner" id="root"></div></div>
<script>
"use strict";

/* ===== SVG Icons ===== */
var ICON = {
  refresh: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>',
  search:  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  x:       '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  lock:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>',
  bulb:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0018 8 6 6 0 006 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 018.91 14"/></svg>',
  trophy:  '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="8 21 12 21 16 21"/><line x1="12" y1="21" x2="12" y2="17"/><path d="M7 4H17L19 7C19 11 16 14 12 14C8 14 5 11 5 7L7 4Z"/><path d="M5 7H3C3 7 2 14 7 14"/><path d="M19 7H21C21 7 22 14 17 14"/></svg>',
  film:    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>',
  chart:   '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  flag:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>',
  spin:    '<svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10" opacity=".2"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>',
  spin14:  '<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10" opacity=".2"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>'
};

/* ===== API config ===== */
var OMDB_KEY  = "e7877ba1";
var CIN_TOP   = "https://v3-cinemeta.strem.io/catalog/movie/top.json";
function cinSearch(q)  { return "https://v3-cinemeta.strem.io/catalog/movie/top/search=" + encodeURIComponent(q) + ".json"; }
function cinMeta(id)   { return "https://v3-cinemeta.strem.io/meta/movie/" + id + ".json"; }
function omdbURL(id)   { return "https://www.omdbapi.com/?i=" + id + "&apikey=" + OMDB_KEY; }

var MAX_GUESSES = 10;
var HINTS_CFG = [
  { key:"plot",   label:"Plot teaser",    unlockAt:4 },
  { key:"actor",  label:"Featured actor", unlockAt:6 },
  { key:"actor2", label:"Also starring",  unlockAt:8 }
];

/* ===== Fetch ===== */
function getJSON(url, ms) {
  ms = ms || 10000;
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms);
  return fetch(url, { signal: ctrl.signal }).then(
    function(r) { clearTimeout(timer); if (!r.ok) throw new Error("http " + r.status); return r.json(); },
    function(e) { clearTimeout(timer); throw e; }
  );
}

function parseBO(s) {
  if (!s || s === "N/A") return 0;
  var v = parseInt(String(s).replace(/[^0-9]/g, ""), 10);
  return isFinite(v) ? Math.round(v / 1e6) : 0;
}

function buildMovie(meta) {
  var m = {
    id:       meta.id,
    title:    meta.name || meta.title || "—",
    year:     parseInt(meta.year, 10) || parseInt(String(meta.releaseInfo || "").slice(0, 4), 10) || 0,
    director: (Array.isArray(meta.director) ? meta.director[0] : meta.director) || "Unknown",
    imdb:     parseFloat(meta.imdbRating) || 0,
    runtime:  parseInt(String(meta.runtime || "").replace(/[^0-9]/g, ""), 10) || 0,
    genres:   Array.isArray(meta.genres) ? meta.genres : [],
    cast:     Array.isArray(meta.cast) ? meta.cast.slice(0, 5) : [],
    plot:     meta.description || "",
    rated:    "—", boxOffice: 0
  };
  return getJSON(omdbURL(meta.id), 6000).then(
    function(o) {
      if (o && o.Response === "True") {
        if (o.Rated && o.Rated !== "N/A")      m.rated     = o.Rated;
        if (o.BoxOffice && o.BoxOffice !== "N/A") m.boxOffice = parseBO(o.BoxOffice);
        if (m.year === 0 && o.Year)            m.year      = parseInt(o.Year, 10) || 0;
        if ((m.director === "Unknown" || !m.director) && o.Director && o.Director !== "N/A")
          m.director = o.Director.split(",")[0].trim();
      }
      return m;
    },
    function() { return m; }
  );
}

/* ===== Helpers ===== */
function norm(s)  { return String(s == null ? "" : s).toLowerCase().replace(/[^a-z0-9]/g, ""); }
function n(x)     { var v = Number(x); return isFinite(v) ? v : 0; }
function esc(s)   { return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtBO(m) { return !m ? "N/A" : (m >= 1000 ? "$" + (m / 1000).toFixed(1) + "B" : "$" + m + "M"); }
function fmtRT(m) { if (!m) return "—"; var h = Math.floor(m / 60), mn = m % 60; return h > 0 ? h + "h " + (mn < 10 ? "0" : "") + mn + "m" : mn + "m"; }

var UNKNOWN = { "": 1, "na": 1, "unknown": 1, "none": 1, "—": 1 };
function known(v) { return !UNKNOWN[norm(v)]; }
function exactMatch(a, b) { return (known(a) && known(b) && norm(a) === norm(b)) ? "green" : "gray"; }

function numCmp(g, t, within) {
  if (!g && !t) return { c: "gray", dir: "" };
  if (g === t)  return { c: "green", dir: "" };
  return { c: Math.abs(g - t) <= within ? "gold" : "gray", dir: t > g ? "▲" : "▼" };
}

function castColor(actor, idx, target) {
  var tc = (target.cast || []).map(norm);
  var ti = tc.indexOf(norm(actor));
  if (ti === -1) return "gray";
  return ((idx === 0 ? "lead" : "supp") === (ti === 0 ? "lead" : "supp")) ? "green" : "gold";
}

/* ===== State ===== */
var S = {
  secret: null, loadSec: true, secErr: "",
  guesses: [], query: "", sugs: [], sugging: false,
  loadG: false, pendTitle: "", gErr: false,
  round: 1, stats: { played: 0, won: 0, streak: 0 },
  revealed: { plot: false, actor: false, actor2: false },
  dropOpen: false, gaveUp: false
};
var topList = null, usedIds = [], sugReqId = 0, debTimer = null;

function isWon()  { return !!(S.secret && S.guesses.some(function(g) { return g.id === S.secret.id; })); }
function isDone() { var w = isWon(); return w || S.gaveUp || !!(S.secret && !w && S.guesses.length >= MAX_GUESSES); }

/* ===== Global onclick handlers (mobile-safe) ===== */
function revealHint(key)   { S.revealed[key] = true; render(); }
function retryLoad()        { loadSecret(); }
function triggerNewGame()   { newGame(); }
function triggerGiveUp()    {
  if (confirm("Give up and reveal the answer?")) {
    S.gaveUp = true;
    S.stats.played++;
    S.stats.streak = 0;
    render();
  }
}
function triggerPlayAgain() { newGame(); }
function triggerClear()     {
  S.query = ""; S.sugs = []; S.dropOpen = false;
  var inp = document.getElementById("searchInput");
  if (inp) { inp.value = ""; inp.focus(); }
  renderDrop();
}
function triggerPick(id, name) { pickMovie({ id: id, name: name }); }

/* ===== Deductions ===== */
function computeDeductions() {
  var d = {
    yearMin: null, yearMax: null, yearExact: false,
    boMin: null,   boMax: null,   boExact: false,
    rtMin: null,   rtMax: null,   rtExact: false,
    imdbMin: null, imdbMax: null, imdbExact: false,
    genres: [], cast: []
  };
  if (!S.secret || !S.guesses.length) return d;
  var tGenres = (S.secret.genres || []).map(norm);
  var tCast   = (S.secret.cast || []).map(norm);
  var seenG   = {}, seenC = {};

  S.guesses.forEach(function(g) {
    function updateRange(gv, tv, minKey, maxKey, exactKey) {
      if (!gv || !tv) return;
      if (gv < tv) { d[minKey] = d[minKey] === null ? gv : Math.max(d[minKey], gv); }
      else if (gv > tv) { d[maxKey] = d[maxKey] === null ? gv : Math.min(d[maxKey], gv); }
      else { d[minKey] = d[maxKey] = gv; d[exactKey] = true; }
    }
    updateRange(n(g.year),      n(S.secret.year),      "yearMin","yearMax","yearExact");
    updateRange(n(g.boxOffice), n(S.secret.boxOffice),  "boMin",  "boMax",  "boExact");
    updateRange(n(g.runtime),   n(S.secret.runtime),    "rtMin",  "rtMax",  "rtExact");
    updateRange(n(g.imdb),      n(S.secret.imdb),       "imdbMin","imdbMax","imdbExact");

    (g.genres || []).forEach(function(gen) {
      if (tGenres.indexOf(norm(gen)) !== -1 && !seenG[norm(gen)]) {
        seenG[norm(gen)] = 1; d.genres.push(gen);
      }
    });
    (g.cast || []).forEach(function(actor) {
      if (tCast.indexOf(norm(actor)) !== -1 && !seenC[norm(actor)]) {
        seenC[norm(actor)] = 1; d.cast.push(actor);
      }
    });
  });
  return d;
}

function dedRangeStr(min, max, exact, fmt) {
  if (min === null && max === null) return '<span style="color:#3f3f46">—</span>';
  if (exact || (min !== null && max !== null && min === max))
    return '<span class="ded-cell-val exact">' + esc(fmt(min)) + ' ✓</span>';
  if (min !== null && max !== null)
    return '<span class="ded-cell-val">' + esc(fmt(min)) + ' – ' + esc(fmt(max)) + '</span>';
  if (min !== null) return '<span class="ded-cell-val">&gt; ' + esc(fmt(min)) + '</span>';
  return '<span class="ded-cell-val">&lt; ' + esc(fmt(max)) + '</span>';
}

function buildDeductions() {
  if (!S.secret || !S.guesses.length || isDone()) return "";
  var d = computeDeductions();
  var hasNum = d.yearMin!==null || d.yearMax!==null || d.boMin!==null || d.boMax!==null ||
               d.rtMin!==null  || d.rtMax!==null  || d.imdbMin!==null || d.imdbMax!==null;
  var hasKnown = d.genres.length > 0 || d.cast.length > 0;
  if (!hasNum && !hasKnown) return "";

  var html = '<div class="deductions"><div class="ded-hdr">' + ICON.chart + ' Deductions</div>';

  if (hasNum) {
    html += '<div class="ded-grid">';
    html += '<div class="ded-cell"><div class="ded-cell-lbl">Year</div>'        + dedRangeStr(d.yearMin, d.yearMax, d.yearExact, function(v){return v;})          + '</div>';
    html += '<div class="ded-cell"><div class="ded-cell-lbl">Box Office</div>'  + dedRangeStr(d.boMin,   d.boMax,   d.boExact,   fmtBO)                           + '</div>';
    html += '<div class="ded-cell"><div class="ded-cell-lbl">Runtime</div>'     + dedRangeStr(d.rtMin,   d.rtMax,   d.rtExact,   fmtRT)                           + '</div>';
    html += '<div class="ded-cell"><div class="ded-cell-lbl">IMDb</div>'        + dedRangeStr(d.imdbMin, d.imdbMax, d.imdbExact, function(v){return v.toFixed(1);}) + '</div>';
    html += '</div>';
  }

  if (hasKnown) {
    html += '<div class="ded-known">';
    if (d.genres.length) {
      html += '<div class="ded-known-row"><span class="ded-known-lbl">Genres:</span>';
      d.genres.forEach(function(g) { html += '<span class="chip green">' + esc(g) + '</span>'; });
      html += '</div>';
    }
    if (d.cast.length) {
      html += '<div class="ded-known-row"><span class="ded-known-lbl">Cast:</span>';
      d.cast.forEach(function(a) { html += '<span class="chip gold">' + esc(a) + '</span>'; });
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

/* ===== Hints ===== */
function hintText(key) {
  if (!S.secret) return "";
  if (key === "plot") {
    var words = String(S.secret.plot || "").split(/\s+/).filter(Boolean);
    return words.length ? words.slice(0, 22).join(" ") + (words.length > 22 ? "…" : "") : "No synopsis available.";
  }
  if (key === "actor")  return (S.secret.cast || [])[1] || (S.secret.cast || [])[0] || "—";
  if (key === "actor2") return (S.secret.cast || [])[3] || (S.secret.cast || [])[2] || "—";
  return "";
}

function buildHints() {
  var html = '<div class="hints-hdr">' + ICON.bulb + ' &nbsp;Hints</div><div class="hints-grid">';
  HINTS_CFG.forEach(function(h) {
    var unlocked = S.guesses.length >= h.unlockAt;
    var isOpen   = S.revealed[h.key];
    if (!unlocked) {
      html += '<div class="hint-locked">' + ICON.lock + '&nbsp; ' + esc(h.label) + ' · after guess ' + h.unlockAt + '</div>';
    } else if (!isOpen) {
      html += '<button class="hint-reveal" onclick="revealHint(\'' + h.key + '\')">Reveal · ' + esc(h.label) + '</button>';
    } else {
      html += '<div class="hint-open"><div class="hint-lbl">' + esc(h.label) + '</div><div class="hint-val">' + esc(hintText(h.key)) + '</div></div>';
    }
  });
  html += '</div>';
  return html;
}

/* ===== Guess row ===== */
function tileHTML(color, label, val, sm, delay) {
  return '<div class="tile ' + color + ' tile-in" style="animation-delay:' + delay + 'ms">'
       + '<div class="t-lbl">' + label + '</div>'
       + '<span class="t-val' + (sm ? " sm" : "") + '">' + val + '</span></div>';
}

function buildGuessRow(g, target, idx) {
  var yearK = n(g.year) > 0 && n(target.year) > 0;
  var imdbK = n(g.imdb) > 0 && n(target.imdb) > 0;
  var boK   = n(g.boxOffice) > 0 && n(target.boxOffice) > 0;
  var rtK   = n(g.runtime) > 0 && n(target.runtime) > 0;
  var year  = yearK ? numCmp(n(g.year),      n(target.year),      5)   : { c:"gray", dir:"" };
  var imdb  = imdbK ? numCmp(n(g.imdb),      n(target.imdb),      0.5) : { c:"gray", dir:"" };
  var bo    = boK   ? numCmp(n(g.boxOffice), n(target.boxOffice), 100) : { c:"gray", dir:"" };
  var rt    = rtK   ? numCmp(n(g.runtime),   n(target.runtime),   15)  : { c:"gray", dir:"" };
  var dirC  = exactMatch(g.director, target.director);
  var ratC  = exactMatch(g.rated,    target.rated);
  var tG    = {};
  (target.genres || []).forEach(function(x) { tG[norm(x)] = 1; });

  var html = '<div class="guess-row">'
    + '<div class="guess-hdr"><span class="guess-name">' + esc(g.title) + '</span><span class="guess-num">Guess ' + (idx+1) + '</span></div>'
    + '<div class="tile-grid">'
    + tileHTML(dirC,   "Director",   esc(g.director || "—"), true, 0)
    + tileHTML(ratC,   "Rated",      esc(g.rated || "—"),    false, 50)
    + tileHTML(year.c, "Year",       (g.year || "—") + (year.dir ? " " + year.dir : ""), false, 100)
    + tileHTML(bo.c,   "Box Office", fmtBO(n(g.boxOffice)) + (bo.dir ? " " + bo.dir : ""), false, 150)
    + tileHTML(imdb.c, "IMDb",       (n(g.imdb) > 0 ? n(g.imdb).toFixed(1) : "—") + (imdb.dir ? " " + imdb.dir : ""), false, 200)
    + tileHTML(rt.c,   "Runtime",    fmtRT(n(g.runtime)) + (rt.dir ? " " + rt.dir : ""), false, 250)
    + '</div>';

  var genChips = "";
  if (!(g.genres || []).length) { genChips = '<span style="font-size:11px;color:#52525b">—</span>'; }
  else { (g.genres || []).forEach(function(gen) { genChips += '<span class="chip ' + (tG[norm(gen)] ? "green" : "gray") + '">' + esc(gen) + '</span>'; }); }

  var castChips = "";
  if (!(g.cast || []).length) { castChips = '<span style="font-size:11px;color:#52525b">—</span>'; }
  else { (g.cast || []).forEach(function(a, i) { castChips += '<span class="chip ' + castColor(a, i, target) + '">' + esc(a) + '</span>'; }); }

  html += '<div class="chip-row tile-in" style="animation-delay:300ms"><div class="t-lbl">Genres</div><div class="chips">' + genChips + '</div></div>';
  html += '<div class="chip-row tile-in" style="animation-delay:340ms"><div class="t-lbl">Cast</div><div class="chips">' + castChips + '</div></div>';
  html += '</div>';
  return html;
}

/* ===== Render ===== */
function render() {
  var won  = isWon();
  var lost = S.secret && !won && S.guesses.length >= MAX_GUESSES;
  var done = isDone();
  var left = MAX_GUESSES - S.guesses.length;
  var html = "";

  /* header */
  html += '<div class="hdr">';
  html += '<span class="badge">QUANDLE</span>';
  html += '<div class="hdr-btns">';
  if (!done && S.secret) {
    html += '<button class="btn-give-up" onclick="triggerGiveUp()">' + ICON.flag + ' Give up</button>';
  }
  html += '<button class="btn-new" onclick="triggerNewGame()">' + ICON.refresh + ' New game</button>';
  html += '</div></div>';

  /* title */
  html += '<div class="t-wrap"><div class="t-main">QU<span class="t-dot">●</span>NDLE</div><span class="t-sub">MOVIES · UNLIMITED</span></div>';
  html += '<p class="subtitle">Guess the movie in 10 tries · <strong>' + left + '</strong> left · round ' + S.round + '</p>';

  /* secret loading */
  if (S.loadSec) {
    html += '<div class="status-card">' + ICON.spin + ' &nbsp;Loading a film…</div>';
  }
  if (S.secErr && !S.loadSec) {
    html += '<div class="status-card error"><div class="err-title">Couldn\'t reach the movie database.</div>'
          + '<p>' + (S.secErr === "timeout" ? "Request timed out." : "Check your internet connection.") + '</p>'
          + '<button class="btn-retry" onclick="retryLoad()">Try again</button></div>';
  }

  /* search */
  if (!done && S.secret) {
    html += '<div class="search-wrap" id="searchWrap">'
          + '<div class="search-box">'
          + '<span class="s-icon">' + (S.loadG ? ICON.spin : ICON.search) + '</span>'
          + '<input id="searchInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" '
          + 'placeholder="' + (S.loadG ? "Checking " + esc(S.pendTitle) + "…" : "Type any movie title…") + '" '
          + 'value="' + esc(S.query) + '" ' + (S.loadG ? 'disabled' : '') + ' />'
          + (S.query && !S.loadG ? '<button class="clear-btn" onclick="triggerClear()">' + ICON.x + '</button>' : '')
          + '</div>'
          + '<div id="dropArea"></div>'
          + (S.gErr ? '<p class="err-msg">Couldn\'t load that title — try another.</p>' : '')
          + '</div>';
  }

  /* deductions */
  html += buildDeductions();

  /* hints */
  if (!done && S.secret) html += buildHints();

  /* banner */
  if (done && S.secret) {
    var cls  = won ? "win" : S.gaveUp ? "gaveup" : "lose";
    var ttl  = won ? '<span class="trophy">' + ICON.trophy + '</span> Solved in ' + S.guesses.length + '!'
                   : S.gaveUp ? ICON.flag + ' You gave up.'
                   : 'Out of tries.';
    html += '<div class="banner ' + cls + '">'
          + '<div class="banner-ttl">' + ttl + '</div>'
          + '<p>The movie was <strong>' + esc(S.secret.title) + '</strong> (' + (S.secret.year || "—") + ')</p>'
          + '<button class="btn-again" onclick="triggerPlayAgain()">' + ICON.refresh + ' Play again</button>'
          + '</div>';
  }

  /* guesses — newest first */
  html += '<div class="guesses">';
  if (S.secret && S.guesses.length === 0 && !done) {
    html += '<div class="empty">' + ICON.film + '<span>Make your first guess. Tiles reveal clues.</span></div>';
  }
  for (var i = S.guesses.length - 1; i >= 0; i--) {
    html += buildGuessRow(S.guesses[i], S.secret, i);
  }
  html += '</div>';

  /* legend + thresholds */
  html += '<div class="legend-section">'
        + '<div class="legend-ttl">How tiles work</div>'
        + '<div class="legend-row">'
        + '<span class="legend-item"><i class="swatch green"></i> Exact match</span>'
        + '<span class="legend-item"><i class="swatch gold"></i> Close (see below)</span>'
        + '<span class="legend-item"><i class="swatch gray"></i> No match</span>'
        + '<span class="legend-item">▲ / ▼ &nbsp;Answer is higher / lower</span>'
        + '</div>'
        + '<div class="thresholds">'
        + '<div class="thresh-ttl">Yellow (close) thresholds</div>'
        + '<div class="thresh-grid">'
        + '<div class="thresh-item"><strong>Year</strong> within 5 years</div>'
        + '<div class="thresh-item"><strong>IMDb</strong> within 0.5 points</div>'
        + '<div class="thresh-item"><strong>Box Office</strong> within $100M</div>'
        + '<div class="thresh-item"><strong>Runtime</strong> within 15 min</div>'
        + '</div>'
        + '<div style="font-size:11px;color:#52525b;margin-top:6px">Director, Rated, Genres, and Cast are exact-match only — no yellow.</div>'
        + '</div></div>';

  if (S.stats.played > 0) {
    html += '<p class="stats-line">' + S.stats.won + '/' + S.stats.played + ' solved · streak ' + S.stats.streak + '</p>';
  }
  html += '<p class="footer">Quandle · Fan-made movie guessing game · Data from Cinemeta &amp; OMDb</p>';

  document.getElementById("root").innerHTML = html;

  /* re-attach search input listeners */
  var inp = document.getElementById("searchInput");
  if (inp) {
    inp.addEventListener("input", function(e) {
      S.query = e.target.value;
      S.dropOpen = true;
      debouncedSearch(S.query);
    });
    inp.addEventListener("focus", function() { S.dropOpen = true; renderDrop(); });
    inp.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && S.sugs.length) pickMovie(S.sugs[0]);
    });
  }

  renderDrop();
}

/* ===== Dropdown ===== */
function renderDrop() {
  var area = document.getElementById("dropArea");
  if (!area) return;
  if (!S.dropOpen || S.loadG || (!S.sugs.length && !S.sugging)) { area.innerHTML = ""; return; }
  var html = '<ul class="dropdown">';
  if (S.sugging && !S.sugs.length) {
    html += '<li><div class="searching">' + ICON.spin14 + ' &nbsp;Searching…</div></li>';
  }
  S.sugs.forEach(function(s) {
    html += '<li><button onclick="triggerPick(\'' + esc(s.id) + '\',\'' + esc(s.name).replace(/'/g,"&#39;") + '\')">' + esc(s.name) + '</button></li>';
  });
  html += '</ul>';
  area.innerHTML = html;
}

/* close dropdown on outside click */
document.addEventListener("click", function(e) {
  if (!S.dropOpen) return;
  var wrap = document.getElementById("searchWrap");
  if (wrap && !wrap.contains(e.target)) { S.dropOpen = false; renderDrop(); }
});

/* ===== Search ===== */
function debouncedSearch(q) {
  clearTimeout(debTimer);
  var id = ++sugReqId;
  if (q.trim().length < 2) { S.sugs = []; S.sugging = false; renderDrop(); return; }
  S.sugging = true; renderDrop();
  debTimer = setTimeout(function() {
    getJSON(cinSearch(q)).then(
      function(res) {
        if (id !== sugReqId) return;
        var guessedIds = {};
        S.guesses.forEach(function(g) { guessedIds[g.id] = 1; });
        var seen = {}, out = [];
        (res.metas || []).forEach(function(m) {
          if (m && m.id && m.id.indexOf("tt") === 0 && !guessedIds[m.id] && !seen[m.id]) {
            seen[m.id] = 1;
            out.push({ id: m.id, name: m.name || m.title || m.id });
            if (out.length >= 8) return;
          }
        });
        S.sugs = out; S.sugging = false; renderDrop();
      },
      function() { if (id === sugReqId) { S.sugs = []; S.sugging = false; renderDrop(); } }
    );
  }, 350);
}

/* ===== Pick movie ===== */
function pickMovie(sug) {
  if (!S.secret || S.loadG || isDone()) return;
  for (var i = 0; i < S.guesses.length; i++) {
    if (S.guesses[i].id === sug.id) { S.query = ""; S.dropOpen = false; render(); return; }
  }
  S.dropOpen = false; S.query = ""; S.sugs = []; S.gErr = false;
  S.loadG = true; S.pendTitle = sug.name; render();

  getJSON(cinMeta(sug.id)).then(
    function(detail) {
      if (!detail.meta) throw new Error("no meta");
      return buildMovie(detail.meta);
    }
  ).then(
    function(movie) {
      S.guesses.push(movie);
      var didWin  = movie.id === S.secret.id;
      var didLose = !didWin && S.guesses.length >= MAX_GUESSES;
      if (didWin || didLose) {
        S.stats.played++;
        if (didWin) { S.stats.won++; S.stats.streak++; } else { S.stats.streak = 0; }
      }
      S.loadG = false; S.pendTitle = ""; render();
    },
    function() {
      S.loadG = false; S.pendTitle = ""; S.gErr = true; render();
      setTimeout(function() { S.gErr = false; var el = document.getElementById("gErrMsg"); if (el) el.style.display = "none"; }, 2600);
    }
  );
}

/* ===== Load secret ===== */
function loadSecret() {
  S.loadSec = true; S.secErr = ""; S.secret = null; render();
  var step = topList ? Promise.resolve() : getJSON(CIN_TOP).then(
    function(d) {
      topList = (d.metas || []).filter(function(m) { return m && m.id && m.id.indexOf("tt") === 0; });
      if (!topList.length) throw new Error("empty");
    }
  );
  step.then(function() {
    var recent = usedIds.slice(-30);
    var pool = topList.filter(function(m) { return recent.indexOf(m.id) === -1; });
    var list = pool.length ? pool : topList;
    var pick = list[Math.floor(Math.random() * list.length)];
    return getJSON(cinMeta(pick.id));
  }).then(
    function(detail) {
      if (!detail.meta) throw new Error("no meta");
      return buildMovie(detail.meta);
    }
  ).then(
    function(movie) { usedIds.push(movie.id); S.secret = movie; S.loadSec = false; render(); },
    function(e)     { S.secErr = (e && e.name === "AbortError") ? "timeout" : "network"; S.loadSec = false; render(); }
  );
}

/* ===== New game ===== */
function newGame() {
  S.guesses = []; S.query = ""; S.sugs = []; S.dropOpen = false; S.gErr = false; S.gaveUp = false;
  S.revealed = { plot: false, actor: false, actor2: false };
  S.round++;
  loadSecret();
}

/* ===== Boot ===== */
render();
loadSecret();
</script>
</body>
</html>
